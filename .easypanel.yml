name: smart-market
displayName: Smart Market — Retail Intelligence
description: Plataforma de inteligência de varejo powered by Seven Xperts
icon: chart-bar

services:
  frontend:
    dockerfile: frontend/Dockerfile
    context: .
    ports:
      - 80:80
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    dockerfile: Dockerfile
    context: .
    ports:
      - 3000:3000
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: https://qfkwqfrnemqregjqxkcr.supabase.co
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

domains:
  - domain: diversos-smartmarket.yuhqmc.easypanel.host
    service: frontend
    https: true
    certificateProvider: letsencrypt

repository:
  provider: github
  owner: sxsevenxperts
  repo: easy-market
  branch: main

autoDeploy:
  enabled: true
  onPush: true
  branches:
    - main
