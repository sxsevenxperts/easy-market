    dockerfile: frontend/Dockerfile
    context: .
    ports:
      - 80:80
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

