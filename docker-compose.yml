# ============================================================
# Easy Market - Docker Compose
# Local development environment
# ============================================================

version: "3.9"

services:
  # ----------------------------------------------------------
  # Backend: Node.js API
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: easy-market-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      # Hot reload: mount source for development
      - ./backend/src:/app/src:ro
    networks:
      - easy-market-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: []

  # ----------------------------------------------------------
  # Frontend: Nginx serving static files
  # ----------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: easy-market-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - easy-market-network
    depends_on:
      - backend

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  easy-market-network:
    driver: bridge
    name: easy-market-network
