version: '3.8'

services:
  # Easy Market Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-market-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api/v1

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL:-https://qfkwqfrnemqregjqxkcr.supabase.co}
      SUPABASE_KEY: ${SUPABASE_KEY:-sb_publishable_vBAVB5lBnPY18GbnJxRlkA_fxMYrUmQ}
      SUPABASE_HOST: ${SUPABASE_HOST:-qfkwqfrnemqregjqxkcr.supabase.co}
      SUPABASE_DB: ${SUPABASE_DB:-postgres}
      SUPABASE_USER: ${SUPABASE_USER:-postgres}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD}
      SUPABASE_PORT: ${SUPABASE_PORT:-5432}

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      # Twilio (WhatsApp/SMS)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      TWILIO_SMS_NUMBER: ${TWILIO_SMS_NUMBER}

      # Email
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}

      # Claude API (Revisor)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - ./backend/src:/app/backend/src

    networks:
      - easy-market

  # Redis (Cache + Scheduler)
  redis:
    image: redis:7-alpine
    container_name: easy-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - easy-market

volumes:
  redis-data:

networks:
  easy-market:
    driver: bridge
